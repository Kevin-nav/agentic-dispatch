apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-dispatch-web
  namespace: agentic-dispatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentic-dispatch-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentic-dispatch-web
    spec:
      serviceAccountName: agentic-dispatch-web
      automountServiceAccountToken: false
      containers:
        - name: web
          image: ghcr.io/kevin-nav/agentic-dispatch-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
              readOnly: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory
