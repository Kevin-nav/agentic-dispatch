apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-dispatch-api
  namespace: agentic-dispatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentic-dispatch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentic-dispatch-api
    spec:
      serviceAccountName: agentic-dispatch-api
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/kevin/agentic-dispatch-api:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: agentic-dispatch-api-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
