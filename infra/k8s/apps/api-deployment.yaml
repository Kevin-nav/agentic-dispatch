apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-dispatch-api
  namespace: agentic-dispatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentic-dispatch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentic-dispatch-api
    spec:
      serviceAccountName: agentic-dispatch-api
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/kevin-nav/agentic-dispatch-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: agentic-dispatch-api-env
          env:
            - name: PORT
              value: "3000"
          volumeMounts:
            - name: workspace-data
              mountPath: /workspaces/agentic-dispatch
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      volumes:
        - name: workspace-data
          persistentVolumeClaim:
            claimName: agentic-dispatch-workspaces
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentic-dispatch-workspaces
  namespace: agentic-dispatch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
