apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-dispatch-cloudflared
  namespace: agentic-dispatch
  labels:
    app.kubernetes.io/name: agentic-dispatch-cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentic-dispatch-cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentic-dispatch-cloudflared
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: Always
          args:
            - tunnel
            - --no-autoupdate
            - --loglevel
            - info
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentic-dispatch-cloudflare-tunnel
                  key: CLOUDFLARE_TUNNEL_TOKEN
          ports:
            - name: metrics
              containerPort: 2000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
