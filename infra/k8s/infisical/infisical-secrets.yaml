apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: agentic-dispatch-api-env
  namespace: agentic-dispatch
spec:
  hostAPI: https://app.infisical.com/api
  syncConfig:
    resyncInterval: 60s
    instantUpdates: false
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: agentic-dispatch
      secretsScope:
        projectId: 445f6746-833c-48ad-91a1-7d668843b08a
        envSlug: prod
        secretsPath: /
  managedKubeSecretReferences:
    - secretName: agentic-dispatch-api-env
      secretNamespace: agentic-dispatch
      creationPolicy: Orphan
      template:
        includeAllSecrets: false
        data:
          AGENTIC_DISPATCH_JOB_POLL_INTERVAL_MS: "5000"
          AGENTIC_DISPATCH_JOB_TIMEOUT_MS: "3600000"
          AGENTIC_DISPATCH_SESSION_SECRET: "{{ .AGENTIC_DISPATCH_SESSION_SECRET.Value }}"
          AGENTIC_DISPATCH_WORKSPACE_ROOT: "/workspaces/agentic-dispatch"
          CONVEX_DEPLOYMENT: "{{ .CONVEX_DEPLOYMENT.Value }}"
          CONVEX_SITE_URL: "{{ .CONVEX_SITE_URL.Value }}"
          CONVEX_URL: "{{ .CONVEX_URL.Value }}"
          GITHUB_APP_ID: "{{ .GITHUB_APP_ID.Value }}"
          GITHUB_APP_PRIVATE_KEY: "{{ .GITHUB_APP_PRIVATE_KEY.Value }}"
          INFISICAL_ENV: "prod"
          PORT: "3000"
          T3_BASE_URL: "{{ .T3_BASE_URL.Value }}"
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: agentic-dispatch-t3-env
  namespace: agentic-dispatch
spec:
  hostAPI: https://app.infisical.com/api
  syncConfig:
    resyncInterval: 60s
    instantUpdates: false
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: agentic-dispatch
      secretsScope:
        projectId: 445f6746-833c-48ad-91a1-7d668843b08a
        envSlug: prod
        secretsPath: /
  managedKubeSecretReferences:
    - secretName: agentic-dispatch-t3-env
      secretNamespace: agentic-dispatch
      creationPolicy: Orphan
      template:
        includeAllSecrets: false
        data:
          T3CODE_HOME: "/var/lib/t3code"
---
