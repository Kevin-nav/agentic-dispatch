apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-t3-from-tailscale
  namespace: agentic-dispatch
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: t3-code-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
      ports:
        - protocol: TCP
          port: 3773
