name: Build Images

on:
  push:
    branches:
      - main
    paths:
      - apps/**
      - infra/docker/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - .github/workflows/build-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: kevin-nav

jobs:
  build:
    name: Build and publish ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: agentic-dispatch-api
            dockerfile: apps/api/Dockerfile
          - name: web
            image: agentic-dispatch-web
            dockerfile: apps/web/Dockerfile
          - name: t3
            image: agentic-dispatch-t3
            dockerfile: infra/docker/t3-code-server/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace before image build
        run: |
          pnpm typecheck
          pnpm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:sha-${{ github.sha }}
          build-args: |
            VITE_CONVEX_URL=${{ secrets.VITE_CONVEX_URL }}
            VITE_T3_HOSTED_APP_BASE_URL=${{ secrets.VITE_T3_HOSTED_APP_BASE_URL }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
