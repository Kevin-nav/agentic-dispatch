name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to run kubectl apply on the VPS
        required: true
        default: ""
      repo_path:
        description: Absolute path to the Git checkout on the VPS
        required: true
        default: /opt/agentic-dispatch/repo

permissions:
  contents: read

jobs:
  deploy:
    name: Apply manifests on VPS
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'DEPLOY' }}
    steps:
      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Update repo and apply manifests
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          REPO_PATH: ${{ inputs.repo_path }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" "REPO_PATH='$REPO_PATH' bash -s" <<'EOF'
          set -euo pipefail
          cd "$REPO_PATH"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          sudo crictl pull ghcr.io/kevin-nav/agentic-dispatch-api:latest
          sudo crictl pull ghcr.io/kevin-nav/agentic-dispatch-web:latest
          sudo crictl pull ghcr.io/kevin-nav/agentic-dispatch-t3:latest

          sudo kubectl apply -f infra/k8s/base/namespace.yaml
          sudo kubectl apply -f infra/k8s/base/serviceaccounts.yaml
          sudo kubectl apply -f infra/k8s/base/pod-security.yaml
          sudo kubectl apply -f infra/k8s/base/networkpolicies/default-deny.yaml
          sudo kubectl apply -f infra/k8s/base/networkpolicies/allow-dns.yaml
          sudo kubectl apply -f infra/k8s/base/networkpolicies/allow-control-plane-internal.yaml
          sudo kubectl apply -f infra/k8s/base/networkpolicies/allow-public-egress.yaml
          sudo kubectl apply -f infra/k8s/base/networkpolicies/allow-cloudflare-tunnel.yaml
          sudo kubectl apply -f infra/k8s/infisical/serviceaccount.yaml
          sudo kubectl apply -f infra/k8s/infisical/infisical-secrets.yaml
          sudo kubectl apply -f infra/k8s/apps/t3-deployment.yaml
          sudo kubectl apply -f infra/k8s/apps/t3-service.yaml
          sudo kubectl apply -f infra/k8s/apps/api-deployment.yaml
          sudo kubectl apply -f infra/k8s/apps/api-service.yaml
          sudo kubectl apply -f infra/k8s/apps/web-deployment.yaml
          sudo kubectl apply -f infra/k8s/apps/web-service.yaml
          sudo kubectl apply -f infra/k8s/cloudflare/cloudflared-deployment.yaml
          sudo kubectl rollout status deployment/t3-code-server -n agentic-dispatch --timeout=240s
          sudo kubectl rollout status deployment/agentic-dispatch-api -n agentic-dispatch --timeout=240s
          sudo kubectl rollout status deployment/agentic-dispatch-web -n agentic-dispatch --timeout=240s
          sudo kubectl rollout status deployment/agentic-dispatch-cloudflared -n agentic-dispatch --timeout=120s
          EOF
